<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>LARPG</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <section id="Enemy">
                <img id="Sprite" src="res/Enemy.png">
                <p id="ActionEffect">🔥</p>
                <section id="HPBar">
                    <p>10/10</p>
                    <section id="HP"></section>
                    <section id="DMG"></section>
                </section>
            </section>
            <section id="Actions">
                <section class="action">
                    <p>Fireball</p>
                    <p>(-1 Energy)</p>
                </section>
                <section class="action">
                    <p>Rock Storm</p>
                    <p>(-1 Energy)</p>
                </section>
                <section class="action">
                    <p>Grass Buff</p>
                    <p>(-1 Energy)</p>
                </section>
                <section class="action">
                    <p>Water Curse</p>
                    <p>(-1 Energy)</p>
                </section>
            </section>
            <section id="EnergyBar">
                <p>4/4</p>
                <section id="Energy"></section>
            </section>
        </main>
        <script src="main.js"></script>
    </body>
</html>
